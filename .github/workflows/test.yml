name: Run Cypress UI Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 16 * * *"

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    env:
      GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Cypress
        run: npx cypress install

      - name: Verify Cypress
        run: npx cypress verify

      # ================= CREATE ENV FILE =================
      - name: Create .env file
        run: |
          touch .env
          echo "GMAIL_USER=${{ secrets.GMAIL_USER }}" >> .env
          echo "GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}" >> .env
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env

      # ================= RUN TESTS =================
      - name: Run Cypress tests
        run: |
         rm -rf allure-results
          mkdir -p allure-results
          # Target all nested folders in e2e
          npx cypress run --browser edge --spec "cypress/e2e/**/*.cy.js"
        continue-on-error: true

      # ================= DEBUG (OPTIONAL BUT USEFUL) =================
      - name: Check Allure Results
        run: ls -R allure-results

      # ================= ALLURE REPORT =================
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: |
          rm -rf allure-report
          allure generate allure-results --clean -o allure-report

      # ================= DEPLOY =================
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          keep_files: true